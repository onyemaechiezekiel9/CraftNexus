name: CI

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: craft-nexus-contract

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false

      - name: cargo check
        run: cargo check --tests

      - name: cargo test
        run: cargo test

      - name: Check snapshot files unchanged
        working-directory: .
        run: |
          if git diff --exit-code HEAD -- craft-nexus-contract/test_snapshots/; then
            echo "Snapshots are up to date."
          else
            echo "ERROR: Snapshot files changed — update test_snapshots/ if intentional."
            exit 1
          fi
